<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - UAS</title>
    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; background-color: #f4f4f9; display: flex; }
        .sidebar { width: 250px; background: #2c3e50; color: #fff; height: 100vh; padding: 1rem; box-sizing: border-box; }
        .sidebar h2 { margin-top: 0; }
        .sidebar a { display: block; color: #ecf0f1; text-decoration: none; padding: 0.5rem 0; margin-bottom: 0.5rem; }
        .sidebar a:hover { color: #3498db; }
        .content { flex: 1; padding: 2rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; background: #fff; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        .btn { background: #2ecc71; color: #fff; border: none; padding: 0.5rem 1rem; cursor: pointer; border-radius: 4px; }
        .btn-danger { background: #e74c3c; }
        .form-group { margin-bottom: 1rem; }
        .form-group input { width: 100%; padding: 0.5rem; box-sizing: border-box; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Admin Panel</h2>
        <a href="#" onclick="showSection('products')">Products CRUD</a>
        <a href="#" onclick="showSection('orders')">Orders (Pesanan)</a>
        <a href="index.html">Back to Store</a>
    </div>

    <div class="content">
        <div id="products-section">
            <h2>Manage Products</h2>
            <div style="background: #fff; padding: 1rem; border-radius: 8px; margin-bottom: 1rem;">
                <h3>Add New Product</h3>
                <div class="form-group"><input type="text" id="pName" placeholder="Product Name"></div>
                <div class="form-group"><input type="text" id="pDesc" placeholder="Description"></div>
                <div class="form-group"><input type="number" id="pPrice" placeholder="Price"></div>
                <div class="form-group"><input type="number" id="pStock" placeholder="Stock"></div>
                <div class="form-group"><input type="text" id="pImg" placeholder="Image URL"></div>
                <button class="btn" onclick="createProduct()">Save Product</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Price</th>
                        <th>Stock</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="product-table-body"></tbody>
            </table>
        </div>

        <div id="orders-section" style="display: none;">
            <h2>Orders List</h2>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Customer</th>
                        <th>Phone</th>
                        <th>Total Amount</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="order-table-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';

        function showSection(section) {
            document.getElementById('products-section').style.display = section === 'products' ? 'block' : 'none';
            document.getElementById('orders-section').style.display = section === 'orders' ? 'block' : 'none';
            if (section === 'products') fetchProducts();
            if (section === 'orders') fetchOrders();
        }

        async function fetchProducts() {
            const res = await fetch(`${API_URL}/products`);
            const data = await res.json();
            const tbody = document.getElementById('product-table-body');
            tbody.innerHTML = '';
            if(data.success) {
                data.data.forEach(p => {
                    tbody.innerHTML += `
                        <tr>
                            <td>${p.id}</td>
                            <td>${p.name}</td>
                            <td>Rp ${p.price}</td>
                            <td>${p.stock}</td>
                            <td>
                                <button class="btn btn-danger" onclick="deleteProduct(${p.id})">Delete</button>
                            </td>
                        </tr>
                    `;
                });
            }
        }

        async function createProduct() {
            const product = {
                name: document.getElementById('pName').value,
                description: document.getElementById('pDesc').value,
                price: document.getElementById('pPrice').value,
                stock: document.getElementById('pStock').value,
                image_url: document.getElementById('pImg').value,
                category_id: 1 // Default category
            };
            
            await fetch(`${API_URL}/products`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(product)
            });
            alert('Product created');
            fetchProducts();
        }

        async function deleteProduct(id) {
            if(confirm('Are you sure?')) {
                await fetch(`${API_URL}/products/${id}`, { method: 'DELETE' });
                fetchProducts();
            }
        }

        async function fetchOrders() {
            const res = await fetch(`${API_URL}/orders`);
            const data = await res.json();
            const tbody = document.getElementById('order-table-body');
            tbody.innerHTML = '';
            if(data.success) {
                data.data.forEach(o => {
                    tbody.innerHTML += `
                        <tr>
                            <td>${o.id}</td>
                            <td>${o.customer_name}</td>
                            <td>${o.customer_phone}</td>
                            <td>Rp ${o.total_amount}</td>
                            <td>${o.status}</td>
                        </tr>
                    `;
                });
            }
        }

        fetchProducts(); // Initial load
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - TechStore</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { primary: '#4f46e5' }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-100 font-sans text-gray-800 antialiased h-screen flex overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-64 bg-gray-900 text-white flex flex-col h-full shadow-2xl">
        <div class="h-16 flex items-center px-6 bg-gray-900 border-b border-gray-800">
            <h2 class="text-xl font-bold tracking-tight">Admin<span class="text-primary">Panel</span></h2>
        </div>
        <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
            <a href="#" onclick="showSection('products')" id="nav-products" class="nav-link block px-4 py-2.5 rounded-lg bg-gray-800 text-white font-medium transition-colors">
                📦 Products CRUD
            </a>
            <a href="#" onclick="showSection('orders')" id="nav-orders" class="nav-link block px-4 py-2.5 rounded-lg text-gray-400 hover:bg-gray-800 hover:text-white font-medium transition-colors">
                🛒 Orders
            </a>
            <a href="#" onclick="showSection('users')" id="nav-users" class="nav-link block px-4 py-2.5 rounded-lg text-gray-400 hover:bg-gray-800 hover:text-white font-medium transition-colors">
                👥 Users
            </a>
        </nav>
        <div class="p-4 border-t border-gray-800">
            <a href="index.html" class="flex items-center text-gray-400 hover:text-white transition-colors">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                Back to Store
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full overflow-hidden">
        <!-- Top Header -->
        <header class="h-16 bg-white shadow-sm flex items-center justify-between px-8 border-b">
            <h1 id="section-title" class="text-2xl font-semibold text-gray-800">Manage Products</h1>
            <div class="flex items-center space-x-4">
                <span id="admin-name" class="text-sm font-medium text-gray-500">Admin User</span>
                <div class="w-8 h-8 rounded-full bg-primary text-white flex items-center justify-center font-bold">A</div>
                <button onclick="logout()" class="text-sm text-red-500 hover:text-red-700 font-medium ml-4">Logout</button>
            </div>
        </header>

        <!-- Content Area -->
        <div class="flex-1 overflow-auto p-8 bg-gray-50">
            
            <!-- Products Section -->
            <div id="products-section" class="space-y-6">
                <!-- Add Form Card -->
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
                    <h3 class="text-lg font-medium text-gray-900 mb-4">Add New Product</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Product Name</label>
                            <input type="text" id="pName" class="w-full border-gray-300 rounded-md shadow-sm border p-2 focus:ring-primary focus:border-primary">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
                            <input type="text" id="pDesc" class="w-full border-gray-300 rounded-md shadow-sm border p-2 focus:ring-primary focus:border-primary">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Price (Rp)</label>
                            <input type="number" id="pPrice" class="w-full border-gray-300 rounded-md shadow-sm border p-2 focus:ring-primary focus:border-primary">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Stock Quantity</label>
                            <input type="number" id="pStock" class="w-full border-gray-300 rounded-md shadow-sm border p-2 focus:ring-primary focus:border-primary">
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-sm font-medium text-gray-700 mb-1">Product Image</label>
                            <input type="file" id="pImgFile" accept="image/*" class="w-full border-gray-300 rounded-md shadow-sm border p-2 focus:ring-primary focus:border-primary">
                            <p class="text-xs text-gray-500 mt-1">Select an image to upload (will be stored securely).</p>
                        </div>
                    </div>
                    <div class="mt-4 flex justify-end">
                        <button onclick="createProduct()" class="bg-primary text-white px-4 py-2 rounded-md hover:bg-indigo-700 transition font-medium shadow-sm">
                            Save Product
                        </button>
                    </div>
                </div>

                <!-- Data Table -->
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="min-w-full divide-y divide-gray-200">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ID</th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Product</th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Price</th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Stock</th>
                                    <th scope="col" class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="product-table-body" class="bg-white divide-y divide-gray-200">
                                <!-- Data injected here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Orders Section -->
            <div id="orders-section" class="hidden space-y-6">
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="min-w-full divide-y divide-gray-200">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">ID</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Customer</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Phone</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Total Amount</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
                                </tr>
                            </thead>
                            <tbody id="order-table-body" class="bg-white divide-y divide-gray-200">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Users Section -->
            <div id="users-section" class="hidden space-y-6">
                <!-- Add Form Card -->
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
                    <h3 class="text-lg font-medium text-gray-900 mb-4">Add New User</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                            <input type="text" id="uName" class="w-full border-gray-300 rounded-md shadow-sm border p-2 focus:ring-primary focus:border-primary">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                            <input type="email" id="uEmail" class="w-full border-gray-300 rounded-md shadow-sm border p-2 focus:ring-primary focus:border-primary">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                            <input type="password" id="uPass" class="w-full border-gray-300 rounded-md shadow-sm border p-2 focus:ring-primary focus:border-primary">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Role</label>
                            <select id="uRole" class="w-full border-gray-300 rounded-md shadow-sm border p-2 focus:ring-primary focus:border-primary">
                                <option value="customer">Customer</option>
                                <option value="admin">Admin</option>
                            </select>
                        </div>
                    </div>
                    <div class="mt-4 flex justify-end">
                        <button onclick="createUser()" class="bg-primary text-white px-4 py-2 rounded-md hover:bg-indigo-700 transition font-medium shadow-sm">
                            Save User
                        </button>
                    </div>
                </div>

                <!-- Data Table -->
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="min-w-full divide-y divide-gray-200">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">ID</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Username</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Email</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Role</th>
                                    <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="user-table-body" class="bg-white divide-y divide-gray-200">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- JavaScript Logic -->
    <script>
        const API_URL = 'https://backenduas-production-9579.up.railway.app/api';

        // Auth Guard
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        if (!token || user.role !== 'admin') {
            window.location.href = 'login.html';
        } else {
            document.getElementById('admin-name').innerText = user.username;
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }

        const getAuthHeaders = () => ({
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
        });

        const formatMoney = (amount) => {
            return new Intl.NumberFormat('id-ID').format(amount);
        };

        function showSection(section) {
            // Update Title
            const titles = { 'products': 'Manage Products', 'orders': 'Orders Management', 'users': 'Manage Users' };
            document.getElementById('section-title').innerText = titles[section];

            // Toggle Visibility
            ['products', 'orders', 'users'].forEach(s => {
                document.getElementById(`${s}-section`).classList.toggle('hidden', s !== section);
                
                // Update Nav Active State
                const navItem = document.getElementById(`nav-${s}`);
                if (s === section) {
                    navItem.classList.add('bg-gray-800', 'text-white');
                    navItem.classList.remove('text-gray-400');
                } else {
                    navItem.classList.remove('bg-gray-800', 'text-white');
                    navItem.classList.add('text-gray-400');
                }
            });

            // Fetch Data
            if (section === 'products') fetchProducts();
            if (section === 'orders') fetchOrders();
            if (section === 'users') fetchUsers();
        }

        async function fetchProducts() {
            try {
                const res = await fetch(`${API_URL}/products`); // public
                const data = await res.json();
                const tbody = document.getElementById('product-table-body');
                tbody.innerHTML = '';
                if(data.success) {
                    data.data.forEach(p => {
                        tbody.innerHTML += `
                            <tr class="hover:bg-gray-50">
                                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${p.id}</td>
                                <td class="px-6 py-4 whitespace-nowrap">
                                    <div class="flex items-center">
                                        <div class="h-10 w-10 flex-shrink-0 bg-gray-100 rounded-md overflow-hidden">
                                            <img src="${p.image_url || 'https://via.placeholder.com/150'}" alt="" class="h-full w-full object-cover">
                                        </div>
                                        <div class="ml-4">
                                            <div class="text-sm font-medium text-gray-900">${p.name}</div>
                                            <div class="text-sm text-gray-500 truncate w-48">${p.description}</div>
                                        </div>
                                    </div>
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">Rp ${formatMoney(p.price)}</td>
                                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                                    <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full ${p.stock > 0 ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}">
                                        ${p.stock} in stock
                                    </span>
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                                    <button onclick="deleteProduct(${p.id})" class="text-red-600 hover:text-red-900 bg-red-50 hover:bg-red-100 px-3 py-1 rounded-md transition">Delete</button>
                                </td>
                            </tr>
                        `;
                    });
                }
            } catch (e) {
                console.warn('API connection failed');
            }
        }

        // Helper to convert file to base64
        const fileToBase64 = (file) => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });

        async function createProduct() {
            const fileInput = document.getElementById('pImgFile');
            let imageUrl = '';
            
            if (fileInput.files.length > 0) {
                try {
                    imageUrl = await fileToBase64(fileInput.files[0]);
                } catch (e) {
                    return alert('Failed to process image');
                }
            }

            const product = {
                name: document.getElementById('pName').value,
                description: document.getElementById('pDesc').value,
                price: document.getElementById('pPrice').value,
                stock: document.getElementById('pStock').value,
                image_url: imageUrl,
                category_id: 1
            };
            
            try {
                const response = await fetch(`${API_URL}/products`, {
                    method: 'POST',
                    headers: getAuthHeaders(),
                    body: JSON.stringify(product)
                });
                const result = await response.json();
                if(result.success) {
                    alert('Product created');
                    fetchProducts();
                    document.querySelectorAll('#products-section input').forEach(input => input.value = '');
                } else {
                    alert('Failed: ' + result.message);
                }
            } catch(e) { alert('Failed to connect to API'); }
        }

        async function deleteProduct(id) {
            if(confirm('Are you sure you want to delete this product?')) {
                try {
                    await fetch(`${API_URL}/products/${id}`, { 
                        method: 'DELETE',
                        headers: getAuthHeaders()
                    });
                    fetchProducts();
                } catch(e) {}
            }
        }

        async function fetchOrders() {
            try {
                const res = await fetch(`${API_URL}/orders`, { headers: getAuthHeaders() });
                const data = await res.json();
                const tbody = document.getElementById('order-table-body');
                tbody.innerHTML = '';
                if(data.success) {
                    data.data.forEach(o => {
                        tbody.innerHTML += `
                            <tr class="hover:bg-gray-50">
                                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">#${o.id}</td>
                                <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">${o.customer_name}</td>
                                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${o.customer_phone}</td>
                                <td class="px-6 py-4 whitespace-nowrap text-sm font-bold text-gray-900">Rp ${formatMoney(o.total_amount)}</td>
                                <td class="px-6 py-4 whitespace-nowrap">
                                    <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-yellow-100 text-yellow-800">
                                        ${o.status.toUpperCase()}
                                    </span>
                                </td>
                            </tr>
                        `;
                    });
                }
            } catch(e) {}
        }

        async function fetchUsers() {
            try {
                const res = await fetch(`${API_URL}/users`, { headers: getAuthHeaders() });
                const data = await res.json();
                const tbody = document.getElementById('user-table-body');
                tbody.innerHTML = '';
                if(data.success) {
                    data.data.forEach(u => {
                        tbody.innerHTML += `
                            <tr class="hover:bg-gray-50">
                                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${u.id}</td>
                                <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">@${u.username}</td>
                                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${u.email}</td>
                                <td class="px-6 py-4 whitespace-nowrap">
                                    <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full ${u.role === 'admin' ? 'bg-indigo-100 text-indigo-800' : 'bg-gray-100 text-gray-800'}">
                                        ${u.role.toUpperCase()}
                                    </span>
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                                    <button onclick="deleteUser(${u.id})" class="text-red-600 hover:text-red-900 bg-red-50 hover:bg-red-100 px-3 py-1 rounded-md transition">Delete</button>
                                </td>
                            </tr>
                        `;
                    });
                }
            } catch(e) {}
        }

        async function createUser() {
            const user = {
                username: document.getElementById('uName').value,
                email: document.getElementById('uEmail').value,
                password: document.getElementById('uPass').value,
                role: document.getElementById('uRole').value
            };
            try {
                await fetch(`${API_URL}/users`, {
                    method: 'POST',
                    headers: getAuthHeaders(),
                    body: JSON.stringify(user)
                });
                alert('User created');
                fetchUsers();
                document.querySelectorAll('#users-section input').forEach(input => input.value = '');
            } catch (e) {}
        }

        async function deleteUser(id) {
            if(confirm('Are you sure?')) {
                try {
                    await fetch(`${API_URL}/users/${id}`, { 
                        method: 'DELETE',
                        headers: getAuthHeaders()
                    });
                    fetchUsers();
                } catch (e) {}
            }
        }

        // Init
        fetchProducts();
    </script>
</body>
</html>
